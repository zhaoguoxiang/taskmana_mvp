# Development override — bind-mounts source code for hot-reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  taskmana:
    build:
      dockerfile: Dockerfile.dev
    environment:
      - TASKMANA_DB_PATH=/app/data/taskmana.db
    volumes:
      - .:/app
      - taskmana_data:/app/data
      - taskmana_uploads:/app/uploads
    command: ["--reload"]
